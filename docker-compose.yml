services:
  vendal-authentik-adaptor:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
      ADAPTOR_PASSWORD: ${ADAPTOR_PASSWORD}
      VENDEL_URL: ${VENDEL_URL}
      VENDEL_API_KEY: ${VENDEL_API_KEY}
    # Only expose internally — Authentik reaches it on the Docker network
    expose:
      - "3000"
    networks:
      - authentik_default # must match the network your Authentik stack uses

networks:
  authentik_default:
    external: true
